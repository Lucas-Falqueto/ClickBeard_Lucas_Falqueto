version: '3.8'

services:
  db:
    image: postgres:15
    container_name: clickbeard_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clickbeard

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clickbeard_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - PORT=${BACKEND_PORT:-3001}
      - JWT_SECRET=${JWT_SECRET}
      - TZ=${TZ:-America/Sao_Paulo}
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-5173}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - clickbeard
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${BACKEND_PORT:-3001}/api-docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clickbeard_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-3001}/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - clickbeard

volumes:
  pgdata:

networks:
  clickbeard:
    driver: bridge